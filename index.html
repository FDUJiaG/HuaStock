            navy: { 900: '#0a1628', 800: '#0f1f3a', 700: '#162a4a', 600: '#1e3a5f' },
            gold: { DEFAULT: '#c9a84c', light: '#dfc06a', dark: '#a8882e' },

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1f2937;
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: linear-gradient(135deg, #0a1628 0%, #162a4a 50%, #1e3a5f 100%);
      border-bottom: 3px solid #c9a84c;
      position: relative;
      overflow: hidden;
    }
    .site-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      border-radius: 50%;
    }
    .site-header::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: 20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,0.05) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* ── Filters ── */
    .filter-tab {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1.5px solid transparent;
      background: #f3f4f6;
      color: #6b7280;
      user-select: none;
    }
    .filter-tab:hover { background: #e5e7eb; color: #374151; }
    .filter-tab.active {
      background: #0a1628;
      color: #c9a84c;
      border-color: #c9a84c;
      box-shadow: 0 2px 8px rgba(201,168,76,0.25);
    }

    /* ── Search ── */
    .search-input {
      width: 100%;
      padding: 10px 16px 10px 40px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.2s ease;
      background: white;
    }
    .search-input:focus {
      border-color: #c9a84c;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .search-wrapper { position: relative; }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
    }

    /* ── Stats Bar ── */
    .stat-bubble {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    /* ── Cards ── */
    .report-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    @media (max-width: 480px) {
      .report-grid { grid-template-columns: 1fr; }
    }

    .report-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid #f0f0f0;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .report-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
      border-color: #e0e0e0;
    }

    .card-accent {
      height: 4px;
      flex-shrink: 0;
    }

    .card-body {
      padding: 20px 22px 18px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
      align-self: flex-start;
      color: white;
    }

    .card-title {
      font-family: 'Noto Serif SC', 'Source Han Serif SC', Georgia, serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.5;
      color: #111827;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-filename {
      font-size: 0.78rem;
      color: #9ca3af;
      margin-bottom: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: auto;
      padding-top: 14px;
      border-top: 1px solid #f3f4f6;
    }

    .card-date {
      font-size: 0.78rem;
      color: #6b7280;
    }

    .card-link {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.82rem;
      font-weight: 600;
      color: #0a1628;
      text-decoration: none;
      transition: all 0.2s;
      padding: 4px 12px;
      border-radius: 8px;
      background: #f3f4f6;
    }
    .card-link:hover {
      background: #0a1628;
      color: #c9a84c;
      gap: 8px;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #9ca3af;
    }
    .empty-state svg { margin: 0 auto 16px; }

    /* ── Footer ── */
    .site-footer {
      text-align: center;
      padding: 30px 20px;
      color: #9ca3af;
      font-size: 0.8rem;
      border-top: 1px solid #e5e7eb;
      margin-top: 50px;
      background: white;
    }

    /* ── Category dot colors ── */
    .dot-A\股 { color: #dc2626; }
    .dot-港股 { color: #2563eb; }
    .dot-美股 { color: #059669; }

    /* ── Animations ── */
    .card-enter {
      animation: cardFadeIn 0.35s ease forwards;
    }
    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-exit {
      animation: cardFadeOut 0.25s ease forwards;
    }
    @keyframes cardFadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.95); }
    }
  </style>

  <!-- ════ Client-Side Rendering ════ -->
  <script>
    (function() {
      'use strict';

      const reports = JSON.parse(document.getElementById('reports-data').textContent);
      const grid = document.getElementById('reports-grid');
      const emptyState = document.getElementById('empty-state');
      const totalCountEl = document.getElementById('total-count');

      let currentFilter = 'all';
      let currentSearch = '';

      const filterTabs = document.querySelectorAll('.filter-tab');
      const searchInput = document.getElementById('search-input');

      function render() {
        // Filter by category
        let filtered = reports;
        if (currentFilter !== 'all') {
          filtered = filtered.filter(r => r.categories.includes(currentFilter));
        }
        // Search by keyword
        if (currentSearch.trim()) {
          const q = currentSearch.trim().toLowerCase();
          filtered = filtered.filter(r =>
            r.title.toLowerCase().includes(q) ||
            r.fileName.toLowerCase().includes(q)
          );
        }

        // Update visible count
        if (totalCountEl) totalCountEl.textContent = filtered.length;

        // Empty state
        if (filtered.length === 0) {
          emptyState.classList.remove('hidden');
          grid.innerHTML = '';
          return;
        }
        emptyState.classList.add('hidden');

        // Build cards
        grid.innerHTML = filtered.map((r, i) => {
          const badgesHtml = r.badges.map((b, bi) => `
            <span class="card-badge" style="background: ${b.color}">${b.label}</span>
          `).join('');

          // Card accent bar: gradient if multiple categories, solid if one
          let accentStyle;
          if (r.badges.length === 1) {
            accentStyle = 'background: ' + r.badges[0].color;
          } else {
            const stops = r.badges.map((b, bi) =>
              b.color + ' ' + (bi / r.badges.length * 100) + '%' +
              ', ' + b.color + ' ' + ((bi + 1) / r.badges.length * 100) + '%'
            ).join(', ');
            accentStyle = 'background: linear-gradient(to right, ' + stops + ')';
          }

          return `
          <div class="report-card card-enter" style="animation-delay: ${Math.min(i * 30, 300)}ms">
            <div class="card-accent" style="${accentStyle}"></div>
            <div class="card-body">
              <div class="flex flex-wrap gap-1.5 mb-2.5">
                ${badgesHtml}
              </div>
              <h3 class="card-title" title="${r.title}">${r.title}</h3>
              <div class="card-filename" title="${r.fileName}">${r.fileName}</div>
              <div class="card-meta">
                <span class="card-date">
                  <svg class="w-3.5 h-3.5 inline -mt-0.5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                  </svg>
                  ${r.date}
                </span>
                <a class="card-link" href="${r.path}" target="_blank">
                  阅读报告
                  <svg class="w-3.5 h-3.5 transition-transform duration-200 group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                  </svg>
                </a>
              </div>
            </div>
          </div>
        `}).join('');
      }

      // ── Event Listeners ──
      filterTabs.forEach(tab => {
        tab.addEventListener('click', function() {
          filterTabs.forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          currentFilter = this.dataset.filter;
          render();
        });
      });

      searchInput.addEventListener('input', function() {
        currentSearch = this.value;
        render();
      });

      // Initial render
      render();
    })();
  </script>
